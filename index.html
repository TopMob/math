<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Графики функции, производной и первообразной</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.min.js" defer></script>
    <script src="js/config.js" defer></script>
    <script src="js/utils.js" defer></script>
    <script src="js/state.js" defer></script>
    <script src="js/math-engine.js" defer></script>
    <script src="js/plot-manager.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/app.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero card reveal reveal-delay-1">
        <div class="hero-copy">
          <h1>f(x) = x<sup>3</sup> − 2x<sup>2</sup> + x + 1</h1>
          <p id="sceneRange">Окно: −4.5 … 4.5 | Y: −20 … 40</p>
          <p id="sceneDensity">501 точка</p>
        </div>
      </header>

      <main class="layout">
        <section class="control-panel card reveal reveal-delay-4">
          <div class="toolbar" role="group" aria-label="Переключение графика">
            <button type="button" class="mode-button is-active" data-mode="function">Функция</button>
            <button type="button" class="mode-button" data-mode="derivative">Производная</button>
            <button type="button" class="mode-button" data-mode="integral">Первообразная</button>
            <button type="button" class="mode-button mode-button-combo" data-mode="combo">3 в 1</button>
          </div>

          <div class="axis-editor" aria-label="Ручная настройка диапазона графика">
            <div class="axis-editor-row axis-editor-row-grid">
              <label class="axis-field" for="xMinInput">
                <span class="axis-label">X min</span>
                <input id="xMinInput" type="number" step="0.1" value="-4.5" />
              </label>
              <label class="axis-field" for="xMaxInput">
                <span class="axis-label">X max</span>
                <input id="xMaxInput" type="number" step="0.1" value="4.5" />
              </label>
              <label class="axis-field" for="yMinInput">
                <span class="axis-label">Y min</span>
                <input id="yMinInput" type="number" step="0.1" value="-20" />
              </label>
              <label class="axis-field" for="yMaxInput">
                <span class="axis-label">Y max</span>
                <input id="yMaxInput" type="number" step="0.1" value="40" />
              </label>
            </div>
            <div class="axis-editor-row">
              <button type="button" class="mode-button" id="applyViewportButton">Применить диапазон</button>
              <button type="button" class="mode-button" id="fitYButton">Подобрать Y</button>
            </div>
          </div>
        </section>

        <section class="card chart-card reveal reveal-delay-5">
          <div class="chart-shell">
            <div class="chart-status" id="chartStatus">Готово</div>
            <div id="graph" class="graph" aria-label="График функции"></div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
